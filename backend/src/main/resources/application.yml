spring:
  application:
    name: irrigation-backend

  # ── MongoDB (Reactive) ───────────────────────────────────────────────────
  data:
    mongodb:
      # Docker profile: overridden by SPRING_DATA_MONGODB_URI env var
      uri: mongodb://admin:irrigation_secret@mongodb:27017/irrigation_db?authSource=admin

    # ── Redis ────────────────────────────────────────────────────────────────
    redis:
      host: redis
      port: 6379

# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── MQTT (custom properties — read by MqttConfig.java) ───────────────────────
mqtt:
  broker:
    url: tcp://localhost:1883
  client:
    id: irrigation-backend-1
  topic:
    publish: command/#
  url: tcp://cloud-remote-broker:1883


# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.thesis.irrigation: DEBUG

---
# ── Docker Profile (activated via SPRING_PROFILES_ACTIVE=docker) ────────────

