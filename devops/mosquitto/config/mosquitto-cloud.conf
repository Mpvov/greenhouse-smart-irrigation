# =============================================================================
# mosquitto-cloud.conf — Cloud Broker (Cloud Layer)
# Container: cloud-remote-broker | Port: 1884 (host) / 1883 (internal)
#
# Simulates the central MQTT broker on the cloud server.
# The Spring Boot backend (MqttInboundFlow) subscribes to this broker
# to receive telemetry data forwarded from the local-broker via Bridge.
# =============================================================================

# Listen on standard MQTT port internally (mapped to 1884 on host to avoid conflict)
listener 1883 0.0.0.0

# Allow anonymous connections (Dev environment only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
