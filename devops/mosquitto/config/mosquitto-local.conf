# =============================================================================
# mosquitto-local.conf — Local Broker (Fog Layer Simulator)
# Container: fog-local-broker | Port: 1883
#
# Simulates the MQTT broker located at the greenhouse (Fog/Edge layer).
# The edge-sim.py script publishes sensor data TO this broker.
# This broker then bridges data UP to the cloud-broker via MQTT Bridge.
# =============================================================================

# Listen on standard MQTT port
listener 1883 0.0.0.0

# Allow anonymous connections (Dev environment only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# =============================================================================
# MQTT Bridge (disabled)
# Node-RED chịu trách nhiệm uplink/downlink giữa local và cloud,
# nên local broker không bật bridge để tránh loop/mirror topic user_admin/#.
# =============================================================================
