# =============================================================================
# mosquitto-local.conf — Local Broker (Fog Layer Simulator)
# Container: fog-local-broker | Port: 1883
#
# Simulates the MQTT broker located at the greenhouse (Fog/Edge layer).
# The edge-sim.py script publishes sensor data TO this broker.
# This broker then bridges data UP to the cloud-broker via MQTT Bridge.
# =============================================================================

# Listen on standard MQTT port
listener 1883 0.0.0.0

# Allow anonymous connections (Dev environment only)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# =============================================================================
# MQTT Bridge — Forwards messages from Fog layer up to Cloud layer
# This is the critical link between edge-sim.py and the Spring Boot backend.
# =============================================================================
connection bridge-to-cloud
address cloud-remote-broker:1883

# Forward all messages on the sensor data topic to the cloud broker
# '#' is a wildcard for all sub-topics
topic user_admin/# out 1 "" ""

# Forward command/control messages FROM cloud DOWN to edge devices
topic user_admin/# in 1 "" ""

# Bridge settings
bridge_attempt_unsubscribe false
start_type automatic
restart_timeout 5
