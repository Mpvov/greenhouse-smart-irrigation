server {
    listen 80;
    server_name localhost;

    # 1. Điều hướng cho Frontend (Vite)
    location / {
        proxy_pass http://cloud-frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Quan trọng: Ép Host thành localhost để tránh lỗi 403 từ Vite dev server
        proxy_set_header Host localhost; 
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Điều hướng cho Backend API
    location /api {
        proxy_pass http://cloud-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Điều hướng cho WebSocket (Realtime Data)
    location /ws {
        proxy_pass http://cloud-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}